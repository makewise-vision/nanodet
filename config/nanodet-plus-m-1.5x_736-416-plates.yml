# nanodet-plus-m-1.5x_736-416-plates
# COCO mAP(0.5:0.95) =
#             AP_50  =
#             AP_75  =
#           AP_small =
#               AP_m =
#               AP_l =
save_dir: workspace/nanodet-plus-m-1.5x_736-416-plates-v4
model:
  weight_averager:
    name: ExpMovingAverager
    decay: 0.9998
  arch:
    name: NanoDetPlus
    detach_epoch: 16
    backbone:
      name: ShuffleNetV2
      model_size: 1.5x
      out_stages: [2,3,4]
      activation: LeakyReLU
    fpn:
      name: GhostPAN
      in_channels: [176, 352, 704]
      out_channels: 128
      kernel_size: 5
      num_extra_level: 1
      use_depthwise: True
      activation: LeakyReLU
    head:
      name: NanoDetPlusHead
      num_classes: 1
      input_channel: 128
      feat_channels: 128
      stacked_convs: 2
      kernel_size: 5
      strides: [8, 16, 32, 64]
      activation: LeakyReLU
      reg_max: 7
      norm_cfg:
        type: BN
      loss:
        loss_qfl:
          name: QualityFocalLoss
          use_sigmoid: True
          beta: 2.0
          loss_weight: 1.0
        loss_dfl:
          name: DistributionFocalLoss
          loss_weight: 0.25
        loss_bbox:
          name: GIoULoss
          loss_weight: 2.0
    # Auxiliary head, only use in training time.
    aux_head:
      name: SimpleConvHead
      num_classes: 1
      input_channel: 256
      feat_channels: 256
      stacked_convs: 4
      strides: [8, 16, 32, 64]
      activation: LeakyReLU
      reg_max: 7
data:
  train:
    name: CocoDataset
    img_path: /home/claudio/.makewise/dsk_cache/image
    ann_path: /home/claudio/.makewise/dsk_cache/dataset/coco_format_dataset_56d8e189-7b30-40f5-a949-274d87482c2d/train/instances.json
    input_size: [736,416] #[w,h]
    keep_ratio: True
    pipeline:
      perspective: 0.0005
      scale: [0.75, 1.5]
      stretch: [[0.75, 1.5], [0.75, 1.5]]
      rotation: 30
      shear: 10
      translate: 0.25
      flip: 0.5
      vertical_flip: 0.1
      brightness: 0.2
      contrast: [0.6, 1.4]
      saturation: [0.5, 1.2]
      normalize: [[103.53, 116.28, 123.675], [57.375, 57.12, 58.395]]
  val:
    name: CocoDataset
    img_path: /home/claudio/.makewise/dsk_cache/image
    ann_path: /home/claudio/.makewise/dsk_cache/dataset/coco_format_dataset_56d8e189-7b30-40f5-a949-274d87482c2d/test/instances.json
    input_size: [736,416] #[w,h]
    keep_ratio: True
    pipeline:
      normalize: [[103.53, 116.28, 123.675], [57.375, 57.12, 58.395]]
device:
  gpu_ids: [0]
  workers_per_gpu: 6
  batchsize_per_gpu: 24
  precision: 32 # set to 16 to use AMP training
schedule:
#  resume:
#  load_model: /home/claudio/Programming/nanodet/workspace/nanodet-plus-m-1.5x_416-plates2/model_best/model_best.ckpt
  optimizer:
    name: AdamW
    lr: 0.00025
    weight_decay: 0.05
  warmup:
    name: linear
    steps: 500
    ratio: 0.0001
  total_epochs: 125
  lr_schedule:
    name: CosineAnnealingLR
    T_max: 125
    eta_min: 0.00001
  val_intervals: 1
grad_clip: 35
evaluator:
  name: CocoDetectionEvaluator
  save_key: mAP
log:
  interval: 200

class_names: ['plate']
